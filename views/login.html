<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TeamForge Login</title>
    <link rel="stylesheet" href="/css/login.css">
    <script src="/recruitment/static/recruitment.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const signupText = document.querySelector(".signup-text");
            const currentPeriod = await loadCurrentPeriod();
            if (currentPeriod) {
                console.log("Active recruitment period:", currentPeriod);
                signupText.innerHTML =
                    `<p><div>Applying to the team? </div> <a href="/register/signup">Click here!</a></p>`
            } else {
                console.log("No active recruitment period.");

                signupText.innerHTML =
                    `<p>
                    <div>Applying to the team?</div> 
                    <div>______________________________</div>
                    <div>Please wait for us to announce</div>
                    <div> the next Recruitment period.</div>
                </p>`
            }
        });

    </script>
</head>

<body>

    <div class="login-box">
        <h2>Welcome to TeamForge</h2>

        <div id="currentPeriod"></div>

        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <button type="submit">Continue</button>

            <p><button type="button" class="google-button" id="google-button">Continue with Google</button></p>

            <script>
                document.getElementById('google-button').addEventListener('click', () => {
                    window.location.href = '/google';
                });
            </script>
        </form>


        <p class="signup-text" id="signup-text"></p>



    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Store user info in localStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = data.redirect;
                } else {
                    const message = await response.text();
                    alert(message || 'Invalid email or password');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('An error occurred. Please try again.');
            }
        });
    </script>

</body>

</html>
