<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .manager-page {
            width: 100%;
            min-height: 100vh;
            background-color: var(--porcelain);
        }

        .manager-topbar {
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--carbon-black);
            padding: 10px 20px;
            color: var(--porcelain);
        }

        .manager-brand {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100px;
            height: 100px;
            margin-right: 10px;
        }

        .manager-brand img {
            width: 100px;
            height: 100px;
            margin-right: 10px;
            margin-left: 20px;
        }

        .manager-brand-title {
            font-family: var(--font-road-rage);
            font-size: 48px;
            margin-left: 30px;
            color: var(--porcelain);
        }

        .manager-team-name {
            font-size: 36px;
            color: var(--porcelain);
            margin-left: auto;
            margin-right: 20px;
        }

        .manager-profile-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--iron-gray);
        }

        .manager-content-wrapper {
            display: flex;
            width: 100%;
        }

        .manager-sidebar {
            width: fit-content;
            background-color: var(--carbon-black);
            padding: 10px;
            height: auto;
            flex-shrink: 0;
        }

        .manager-sidebar ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .manager-sidebar ul li {
            text-align: center;
        }

        .manager-sidebar ul li a {
            margin-bottom: 20px;
            color: var(--porcelain);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 150px;
        }

        .manager-sidebar ul li a img {
            width: 25%;
            height: auto;
            margin-bottom: 5px;
            transition: filter 0.3s ease;
        }

        .manager-sidebar ul li a:hover {
            background-color: #f0f0f0;
            border-radius: 5px;
            color: var(--carbon-black);
        }

        .manager-sidebar ul li a:hover img {
            filter: invert(1);
        }

        .manager-main-content {
            flex-grow: 1;
            background-color: var(--gunmetal);
            min-height: calc(100vh - 120px);
        }

        .dashboard-shell {
            margin: 20px;
            padding: 24px;
            min-height: 500px;
            border-radius: 20px;
            background-color: var(--porcelain);
            border: 2px dashed var(--iron-gray);
            color: var(--carbon-black);
        }

        .dashboard-shell h2 {
            margin: 0;
            font-size: 28px;
        }

        .dashboard-shell p {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="manager-page">
        <div class="manager-topbar">
            <div class="manager-brand">
                <img src="/images/teamforge_logo.png" alt="TeamForge Logo">
                <span class="manager-brand-title">TeamForge</span>
            </div>
            <div class="manager-team-name">Viridis Arcus (Team Name)</div>
            <div><img src="/images/sample_profile.png" alt="Profile Picture" class="manager-profile-icon"></div>
        </div>

        <div class="manager-content-wrapper">
            <div class="manager-sidebar" data-role-scope="manager-only">
                <ul>
                    <li>
                        <a href="/announcements">
                            <img src="/images/announcement_logo.png" alt="Announcement Icon">
                            Announcement
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="/images/scheduling_logo.png" alt="Scheduling Icon">
                            Scheduling
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="/images/attendance_logo.png" alt="Attendance Icon">
                            Attendance
                        </a>
                    </li>
                    <li>
                        <a href="/team_management">
                            <img src="/images/recruitment_evaluation_logo.png" alt="Recruitment Evaluation Icon">
                            Team Management
                        </a>
                    </li>
                    <li>
                        <a href="/player_analysis">
                            <img src="/images/player_analysis_logo.png" alt="Player Performance Analysis Icon">
                            Player Performance<br>Analysis
                        </a>
                    </li>
                    <li>
                        <a href="/team_management">
                            <img src="/images/settings_logo.png" alt="Team Management Icon">
                            Team Management
                        </a>
                    </li>
                </ul>
            </div>

            <div class="manager-main-content">
                <section class="dashboard-shell">
                    <h2>Manager Dashboard</h2>
                    <p>Dashboard content is intentionally blank for now.</p>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
