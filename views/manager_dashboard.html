<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .manager-page {
            width: 100%;
            min-height: 100vh;
            background-color: var(--porcelain);
        }

        .manager-topbar {
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--carbon-black);
            padding: 10px 20px;
            color: var(--porcelain);
        }

        .manager-brand {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100px;
            height: 100px;
            margin-right: 10px;
        }

        .manager-brand img {
            width: 100px;
            height: 100px;
            margin-right: 10px;
            margin-left: 20px;
        }

        .manager-brand-title {
            font-family: var(--font-road-rage);
            font-size: 48px;
            margin-left: 30px;
            color: var(--porcelain);
        }

        .manager-team-name {
            font-size: 36px;
            color: var(--porcelain);
            margin-left: auto;
            margin-right: 20px;
        }

        .manager-topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--porcelain);
            background: #2b2d31;
            border: 1px solid #5b6069;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #3b3f46;
        }

        .manager-profile-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--iron-gray);
        }

        .manager-content-wrapper {
            display: flex;
            width: 100%;
        }

        .manager-sidebar {
            width: fit-content;
            background-color: var(--carbon-black);
            padding: 10px;
            height: auto;
            flex-shrink: 0;
        }

        .manager-sidebar ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .manager-sidebar ul li {
            text-align: center;
        }

        .manager-sidebar ul li a {
            margin-bottom: 20px;
            color: var(--porcelain);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 150px;
        }

        .manager-sidebar ul li a img {
            width: 25%;
            height: auto;
            margin-bottom: 5px;
            transition: filter 0.3s ease;
        }

        .manager-sidebar ul li a:hover {
            background-color: #f0f0f0;
            border-radius: 5px;
            color: var(--carbon-black);
        }

        .manager-sidebar ul li a:hover img {
            filter: invert(1);
        }

        .manager-main-content {
            flex-grow: 1;
            background-color: var(--gunmetal);
            min-height: calc(100vh - 120px);
        }

        .dashboard-shell {
            margin: 20px;
            padding: 24px;
            min-height: 500px;
            border-radius: 20px;
            background-color: var(--porcelain);
            border: 2px dashed var(--iron-gray);
            color: var(--carbon-black);
        }

        .dashboard-shell h2 {
            margin: 0;
            font-size: 28px;
        }

        .dashboard-shell p {
            margin-top: 10px;
            font-size: 16px;
        }

        /* Manager Dashboard Grid Layout */
        .manager-dashboard-grid {
            margin: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            gap: 20px;
            align-items: start;
        }

        .manager-card {
            background-color: var(--porcelain);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: var(--carbon-black);
            min-height: 250px;
        }

        .manager-card h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--iron-gray);
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Mock List Styles */
        .mock-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .mock-list li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .mock-list li:last-child {
            border-bottom: none;
        }

        .status-badge {
            background: #d4edda;
            color: #155724;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="manager-page">
        <div class="manager-topbar">
            <div class="manager-brand">
                <img src="/images/teamforge_logo.png" alt="TeamForge Logo">
                <span class="manager-brand-title">TeamForge</span>
            </div>
            <div class="manager-team-name">Viridis Arcus (Team Name)</div>
            <div class="manager-topbar-actions">
                <a href="/logout" class="logout-btn">Logout</a>
                <img src="/uploads/profile-photos/defaultusericon.png" alt="Profile Picture" class="manager-profile-icon js-current-user-photo">
            </div>
        </div>

        <div class="manager-content-wrapper">
            <div class="manager-sidebar" data-role-scope="manager-only">
                <ul>
                    <li>
                        <a href="/announcements">
                            <img src="/images/announcement_logo.png" alt="Announcement Icon">
                            Announcement
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="/images/scheduling_logo.png" alt="Scheduling Icon">
                            Scheduling
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="/images/attendance_logo.png" alt="Attendance Icon">
                            Attendance
                        </a>
                    </li>
                    <li>
                        <a href="/team_management">
                            <img src="/images/recruitment_evaluation_logo.png" alt="Recruitment Evaluation Icon">
                            Team Management
                        </a>
                    </li>
                    <li>
                        <a href="/settings">
                            <img src="/images/settings_logo.png" alt="Team Management Icon">
                            Settings
                        </a>
                    </li>
                </ul>
            </div>

            <div class="manager-main-content">
                <div class="manager-dashboard-grid">
                    <div id="card-players" class="dash-card">
						<h3>Player List</h3>
						<div id="player-list-container">Loading players...</div>
					</div>

					<div id="card-announcements" class="dash-card">
						<h3 style="cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='#007bff'" onmouseout="this.style.color='#333'" onclick="window.location.href='/announcements'">
							Announcements
						</h3>
						<div id="announcement-list-container">Loading announcements...</div>
					</div>

                    <div id="card-calendar" class="dash-card">
						<h3>Calendar</h3>
						<div id="calendar-container">Calendar UI goes here...</div>
					</div>

                    <div id="card-draft" class="dash-card">
						<h3>Upcoming Tournament Draft</h3>
						<div id="draft-list-container">Loading draft...</div>
					</div>

                </div>
            </div>
        </div>
    </div>
    <script src="/js/current_user_photo.js"></script>
</body>
</html>
