<!-- Player Comparison Overlay -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/comparison.css">
    <link rel="stylesheet" href="/css/radar-chart.css">
    <link rel="stylesheet" href="/css/radar-chart.min.css">
    <script type="text/javascript" src="/js/d3.v3.js"></script>
    <script type="text/javascript" src="/js/radar-chart.js"></script>
</head>
<body>
    <div class="overlay">
        <div class="comparison-container">
            <div class="comparison-header">Player Comparison</div>

            <!-- Player Selection Section -->
            <div class="player-selection">
                <div class="player-selector">
                    <label>Player 1:</label>
                    <div id="player1-display">Loading...</div>
                </div>
                <div class="player-selector">
                    <label for="player2-select">Player 2:</label>
                    <select id="player2-select" required></select>
                </div>
            </div>

            <!-- Comparison Content -->
            <div class="comparison-content">
                <!-- Player 1 Card -->
                <div class="player-card" id="card-player1">
                    <img id="pfp-player1" src="/images/sample_profile.png" alt="Player 1" class="player-pfp" style="border-color: #1f77b4;">
                    <div class="player-name" id="name-player1">Player 1</div>
                    <div class="player-rank" id="rank-player1">-</div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 20px; height: 20px; background-color: #1f77b4; border-radius: 3px;"></div>
                        <span style="color: #ffffff;">Player 1</span>
                    </div>
                </div>

                <!-- Radar Chart -->
                <div id="chart-container"></div>

                <!-- Player 2 Card -->
                <div class="player-card" id="card-player2">
                    <img id="pfp-player2" src="/images/sample_profile.png" alt="Player 2" class="player-pfp" style="border-color: #ff7f0e;">
                    <div class="player-name" id="name-player2">Player 2</div>
                    <div class="player-rank" id="rank-player2">-</div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 20px; height: 20px; background-color: #ff7f0e; border-radius: 3px;"></div>
                        <span style="color: #ffffff;">Player 2</span>
                    </div>

                    <!-- Candidate Controls for Player 2 -->
                    <div id="p2-candidate-wrap" style="display: none; flex-direction: column; gap: 6px; margin-top: 15px; width: 100%;">
                        <div style="display: flex; gap: 8px; align-items: stretch; width: 100%;">
                            <button id="p2FavoriteBtn" type="button" aria-pressed="false" title="Mark as candidate favorite"
                                style="width: 42px; height: 42px; flex-shrink: 0; border: 1px solid #d3d6dc; border-radius: 10px; background: #ffffff; color: #6b7280; font-size: 24px; line-height: 1; cursor: pointer;">☆</button>
                            <textarea id="p2FavoriteMemo" placeholder="Memo: Why this player?" disabled
                                style="flex: 1; height: 42px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 12px; resize: none; opacity: 0.5; cursor: not-allowed; transition: opacity 0.2s;"></textarea>
                        </div>
                        <div id="p2FavoriteMsg" style="font-size: 11px; color: var(--muted); text-align: left;"></div>
                    </div>

                    <!-- External Player Search -->
                    <div class="external-search-container" style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; width: 100%;">
                        <label style="font-size: 11px; color: var(--porcelain); margin-bottom: 5px; display: block; text-align: left;">COMPARE EXTERNAL PLAYER</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="externalRiotId" placeholder="GameName#TagLine" style="flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: #fff; font-size: 12px; outline: none; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);">
                            <button id="externalSearchBtn" style="padding: 8px 12px; border-radius: 6px; background: #ff7f0e; color: #fff; border: none; font-weight: bold; cursor: pointer; font-size: 12px; transition: opacity 0.2s;">Search</button>
                        </div>
                        <div id="externalSearchStatus" style="font-size: 11px; color: var(--muted); margin-top: 6px; text-align: left; height: 14px;"></div>
                    </div>
                </div>
            </div>

            <!-- Stats Table -->
            <div class="stats-container">
                <div class="stats-header">DETAILED STATISTICS</div>
                <div class="comparison-legend">
                    <div class="legend-item">
                        <span class="legend-box legend-good"></span>
                        <span>Better Performance</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-box legend-bad"></span>
                        <span>Worse Performance</span>
                    </div>
                </div>
                <div id="stats-list"></div>
            </div>
        </div>
    </div>
</body>
</html>
