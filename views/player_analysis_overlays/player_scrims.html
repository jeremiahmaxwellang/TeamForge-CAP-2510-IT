<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrims Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/player_analysis/scrims.css">
</head>

<body>
  <div class="overlay">
    <div class="overlay-container">
      <h1>Scrims Details</h1>

      <div class="overlay-content">

        <!-- LEFT: Played With Table -->
        <div class="times-played-list">
          <h2>Played with:</h2>
          <div class="times-played-table-frame">
            <table class="times-played-table">
              <thead>
                <tr class="times-played-row">
                  <th>Player</th>
                  <th>Games</th>
                  <th>Avg Comms</th>
                </tr>
              </thead>
              <tbody>
                <tr class="times-played-row">
                  <td colspan="3">No player found.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- RIGHT: Scrim Matches Table with inline evaluation -->
        <div class="scrim-list">
          <div class="scrim-list-header">
            <h2>Scrim Matches</h2>
            <div class="scrim-filter-wrapper">
              <label for="scrimStatusFilter" class="scrim-filter-label">Filter</label>
              <select id="scrimStatusFilter" class="scrim-filter-select">
                <option value="all">All, Evaluated, or Uneval...</option>
                <option value="evaluated">Evaluated</option>
                <option value="unevaluated">Unevaluated</option>
              </select>
            </div>
          </div>

          <div class="scrim-table-frame">
            <table class="scrim-table" id="scrimTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Date</th>
                  <th>Team</th>
                  <th>W/L</th>
                  <th>VOD Link</th>
                  <th>See Evaluation</th>
                </tr>
              </thead>
              <tbody>
                <tr class="scrim-empty-row">
                  <td colspan="7">No scrims found.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</body>

</html>
