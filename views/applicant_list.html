<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicants List</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/applicant_list.css">
</head>
<body>
    <div class="container">
        <div class="header_container">
            <div class="logo">
                <img src="/images/teamforge_logo.png" alt="TeamForge Logo">
                <span class="header_title">TeamForge</span>
            </div>
            <div class="team-name">Viridis Arcus (Team Name)</div>
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="position: relative; display: flex; align-items: center;">
                    <img src="/uploads/profile-photos/defaultusericon.png" alt="Profile Picture" class="js-current-user-photo" id="profileDropdownBtn" style="width: 60px; height: 60px; border-radius: 50%; background-color: var(--iron-gray); cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s;">
                    <div id="profileDropdownMenu" style="display: none; position: absolute; right: 0; top: 75px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 160px; overflow: hidden; z-index: 1000; font-family: sans-serif;">
                        <a href="/settings" style="display: block; padding: 12px 16px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; font-weight: 500; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#f5f5f5'" onmouseout="this.style.backgroundColor='transparent'">Settings</a>
                        <a href="/logout" style="display: block; padding: 12px 16px; color: #dc3545; text-decoration: none; font-weight: 500; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#fef0f0'" onmouseout="this.style.backgroundColor='transparent'">Logout</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="coach-content-wrapper">
            <div class="coach-sidebar" data-role-scope="coach-only">
                <ul></ul>
            </div>

            <div class="coach-main-content">
                <div class="container">
                    <div class="applicant-tabs" style="display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px;">
                        <button class="tab-btn active" data-status="Pending" style="background: transparent; color: #00f2c3; border: none; font-size: 16px; font-weight: bold; cursor: pointer; padding: 5px 10px; border-bottom: 3px solid #00f2c3;">Pending</button>
                        <button class="tab-btn" data-status="Accepted" style="background: transparent; color: #888; border: none; font-size: 16px; font-weight: bold; cursor: pointer; padding: 5px 10px; border-bottom: 3px solid transparent;">Accepted</button>
                        <button class="tab-btn" data-status="Rejected" style="background: transparent; color: #888; border: none; font-size: 16px; font-weight: bold; cursor: pointer; padding: 5px 10px; border-bottom: 3px solid transparent;">Rejected</button>
                    </div>
                    <div class="applicant-header">
                        <h1>Applicants List</h1>
                    </div>

                    <div id="loading" class="loading">Loading applicants...</div>
                    <div id="error" class="error" style="display: none;"></div>

                    <table id="applicantsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Riot ID</th>
                                <th>Primary Role</th>
                                <th>Secondary Role</th>
                                <th>Peak Rank</th>
                                <th>Current Rank</th>
                                <th>GPA</th>
                                <th>CGPA</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="applicantsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/current_user_photo.js"></script>
    <script src="/js/applicant_list.js"></script>
    <script src="/js/userDropdown.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
