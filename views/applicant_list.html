<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicants List</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #36393f;
            color: #ffffff;
            padding: 28px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #2f3136;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #202225;
            box-shadow: 0 14px 34px rgba(0,0,0,0.28);
        }
        h1 {
            color: #ffffff;
            margin-bottom: 30px;
            text-align: left;
            font-weight: 700;
            letter-spacing: 0.4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 12px;
        }
        th {
            background-color: #202225;
            color: #b9bbbe;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #45474d;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #3f4248;
            text-align: left;
            color: #f2f3f5;
        }
        tr:nth-child(even) {
            background-color: #2b2d31;
        }
        tr:hover {
            background-color: #3b3f46;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #b9bbbe;
            background: #202225;
            border-radius: 12px;
        }
        .error {
            color: #ffd4d9;
            text-align: center;
            padding: 20px;
            background-color: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            border-radius: 12px;
        }
        .status {
            padding: 6px 12px;
            border-radius: 999px;
            font-weight: 700;
            text-align: center;
            font-size: 12px;
            display: inline-block;
        }
        .status.pending {
            background-color: rgba(255, 193, 7, 0.2);
            color: #ffd66b;
        }
        .status.active {
            background-color: rgba(0, 242, 195, 0.18);
            color: #00f2c3;
        }
        .status.inactive {
            background-color: rgba(220, 53, 69, 0.2);
            color: #ff7b8a;
        }
        .status.evaluated {
            background-color: rgba(52, 152, 219, 0.2);
            color: #8dc8ff;
        }
        .status.accepted {
            background-color: rgba(40, 167, 69, 0.24);
            color: #7ce79c;
        }
        .status.rejected {
            background-color: rgba(220, 53, 69, 0.24);
            color: #ff9aa6;
        }
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        @media (max-width: 900px) {
            body {
                padding: 14px;
            }
            .container {
                padding: 18px;
                border-radius: 12px;
            }
            table {
                font-size: 13px;
            }
            th, td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Applicants List</h1>
        
        <div id="loading" class="loading">Loading applicants...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <table id="applicantsTable" style="display: none;">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Riot ID</th>
                    <th>Primary Role</th>
                    <th>Secondary Role</th>
                    <th>Peak Rank</th>
                    <th>Current Rank</th>
                    <th>GPA</th>
                    <th>CGPA</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="applicantsBody">
            </tbody>
        </table>
    </div>

    <script src="/js/applicant_list.js"></script>
</body>
</html>
