<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tournament Management</title>
	<link rel="stylesheet" href="/css/style.css">
	<link rel="stylesheet" href="/css/tournament.css">
</head>
<body class="tournament-body">
	<div class="coach-page">
		<div class="coach-topbar">
			<div class="coach-brand">
				<img src="/images/teamforge_logo.png" alt="TeamForge Logo">
				<span class="coach-brand-title">TeamForge</span>
			</div>
			<div class="coach-team-name">Viridis Arcus (Team Name)</div>
			<div class="coach-topbar-actions" style="position: relative;">
				<img src="/uploads/profile-photos/defaultusericon.png" alt="Profile Picture" class="coach-profile-icon js-current-user-photo" id="profileDropdownBtn" style="cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s;">
				<div id="profileDropdownMenu" style="display: none; position: absolute; right: 0; top: 75px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 160px; overflow: hidden; z-index: 1000; font-family: sans-serif;">
					<a href="/settings" style="display: block; padding: 12px 16px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; font-weight: 500; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#f5f5f5'" onmouseout="this.style.backgroundColor='transparent'">Settings</a>
					<a href="/logout" style="display: block; padding: 12px 16px; color: #dc3545; text-decoration: none; font-weight: 500; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#fef0f0'" onmouseout="this.style.backgroundColor='transparent'">Logout</a>
				</div>
			</div>
		</div>

		<div class="coach-content-wrapper">
			<div class="coach-sidebar" data-role-scope="coach-only">
				<ul></ul>
			</div>

			<div class="coach-main-content">
				<main class="tournament-page">
					<section class="tournament-panel">
						<div class="tournament-back-row">
							<a href="/coach_dashboard.html" class="back-btn">Back to Coach Dashboard</a>
						</div>
						<header class="tournament-header">
							<h1>Tournament Management</h1>
							<div class="tournament-actions">
								<button id="createTournamentBtn" class="btn btn-primary" type="button">Create Tournament</button>
								<button id="editTournamentBtn" class="btn btn-edit-tournament" type="button">Edit Tournament</button>
							</div>
						</header>

						<div class="list-filters">
							<span class="list-filters-label">Result Filter</span>
							<div id="resultFilterGroup" class="result-filter-group"></div>
						</div>

						<section id="tournamentList" class="tournament-list"></section>
					</section>
				</main>
			</div>
		</div>
	</div>

	<div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
		<div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
			<div class="modal-header">
				<h2 id="modalTitle">Create Tournament</h2>
				<button id="closeModalBtn" class="icon-btn" type="button" aria-label="Close">&times;</button>
			</div>

			<div class="meta-form">
				<label>
					<span>Name</span>
					<input id="tournamentNameInput" type="text" placeholder="Tournament name" maxlength="100" />
				</label>
				<label>
					<span>Tournament Date</span>
					<input id="tournamentDateInput" type="date" />
				</label>
				<label>
					<span>Result</span>
					<select id="tournamentResultSelect">
						<option value="N/A">N/A</option>
						<option value="W">W</option>
						<option value="L">L</option>
					</select>
				</label>
			</div>

			<div class="teams-layout">
				<article class="team-column" data-team="Team 1">
					<h3>Team 1</h3>
					<div id="team1Roster" class="roles-grid"></div>
				</article>

				<article class="team-column" data-team="Sub">
					<h3>Sub</h3>
					<div id="subRoster" class="roles-grid"></div>
				</article>
			</div>

			<section class="pool-section">
				<div class="pool-header">
					<h4>Players</h4>
					<div class="role-filter" id="roleFilterGroup"></div>
				</div>
				<div id="playersGrid" class="players-grid"></div>
			</section>

			<div class="modal-footer">
				<button id="cancelModalBtn" class="btn" type="button">Cancel</button>
				<button id="confirmTournamentBtn" class="btn btn-primary" type="button">Confirm</button>
			</div>
		</div>
	</div>

	<script src="/js/current_user_photo.js"></script>
	<script src="/js/tournament.js"></script>
	<script src="/js/userDropdown.js"></script>
	<script src="/js/sidebar.js"></script>
</body>
</html>
