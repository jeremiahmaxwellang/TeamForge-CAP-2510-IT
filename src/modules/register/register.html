<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TeamForge Registration</title>

    <!-- Styling -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/register/static/register.css">

    <!-- Register Page JavaScript -->
     <script src="/register/static/register.js"></script>
    <script src="/recruitment/static/recruitment.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const currentPeriodInput = document.getElementById('currentPeriod');
            const currentPeriod = await loadCurrentPeriod();

            if (currentPeriod) {
                console.log("Active recruitment period:", currentPeriod);
                currentPeriodInput.value = currentPeriod.periodId;
            } else {
                console.log("No active recruitment period.");
                currentPeriodInput.value = "";
            }
        });

    </script>
</head>

<body>

    <div class="registration-box">
        <h2>Complete Your Registration</h2>

        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required>

        <label>Riot ID</label>
        <input type="text" id="riotId" placeholder="Enter your Riot ID" required>

        <label>Discord</label>
        <input type="text" id="discord" placeholder="Enter your Discord (e.g. User#1234)" required>

        <label>Profile Photo</label>
        <input type="file" id="profilePhoto" accept=".png,.jpg,.jpeg,image/png,image/jpeg" required>



        <label>GPA</label>
        <input type="number" id="gpa" placeholder="Enter your previous Term GPA" required>

        <label>CGPA</label>
        <input type="number" id="cgpa" placeholder="Enter your CGPA" required>

        <label>Year Level</label>
        <select id="yearLevel" required>
            <option value="">Select current year level</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
        </select>

        <label>Current Rank</label>
        <select id="currentRank" required>
            <option value="">Select current rank</option>
            <option value="Challenger">Challenger</option>
            <option value="Grandmaster">Grandmaster</option>
            <option value="Master">Master</option>
            <option value="Diamond I">Diamond I</option>
            <option value="Diamond II">Diamond II</option>
            <option value="Diamond III">Diamond III</option>
            <option value="Diamond IV">Diamond IV</option>
        </select>

        <label>Peak Rank</label>
        <select id="peakRank" required>
            <option value="">Select peak rank</option>
            <option value="Challenger">Challenger</option>
            <option value="Grandmaster">Grandmaster</option>
            <option value="Master">Master</option>
            <option value="Diamond I">Diamond I</option>
            <option value="Diamond II">Diamond II</option>
            <option value="Diamond III">Diamond III</option>
            <option value="Diamond IV">Diamond IV</option>
        </select>

        <label>Primary Role</label>
        <select id="primaryRole" required>
            <option value="">Select primary role</option>
            <option value="1">Top</option>
            <option value="2">Jungle</option>
            <option value="3">Mid</option>
            <option value="4">AD Carry</option>
            <option value="5">Support</option>
        </select>

        <label>Secondary Role</label>
        <select id="secondaryRole" required>
            <option value="">Select secondary role</option>
            <option value="1">Top</option>
            <option value="2">Jungle</option>
            <option value="3">Mid</option>
            <option value="4">AD Carry</option>
            <option value="5">Support</option>
        </select>

        <input type="text" id="currentPeriod" class="hidden-input" />

        <button onclick="submitRegistration()">Continue</button>
    </div>

</body>

</html>
